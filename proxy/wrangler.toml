name = "axiomic-proxy"
main = "src/worker.ts"
compatibility_date = "2024-11-01"

# Restrict which browser origins may call the proxy (optional).
# Set to your deployed PWA origin in production.
[vars]
ALLOWED_ORIGINS = "*"

# Upstream is Yahoo Finance's public chart API — free, no API key required.
# Optionally override how much history to request (default "10y"):
#   HISTORY_RANGE = "max"
[dev]
port = 8787
